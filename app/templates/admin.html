<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админка — tttt.me</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="card admin-card">
    <h1>Блок рекламы</h1>
    {% if saved %}<p class="saved-flash">✓ Сохранено</p>{% endif %}

    <form method="post" action="/admin">
        <div class="field">
            <label>Тип метки</label>
            <select name="label_kind">
                <option value="ad"  {% if ad.label_kind == "ad"  %}selected{% endif %}>Реклама (серое)</option>
                <option value="tip" {% if ad.label_kind == "tip" %}selected{% endif %}>Совет (зелёное)</option>
            </select>
        </div>

        <div class="field">
            <label>Заголовок</label>
            <input type="text" name="title" value="{{ ad.title }}" required>
        </div>

        <div class="field">
            <label>Текст описания</label>
            <textarea name="text" required>{{ ad.text }}</textarea>
        </div>

        <div class="field">
            <label>Текст основной кнопки</label>
            <input type="text" name="button_text" value="{{ ad.button_text }}" required>
        </div>

        <div class="field">
            <label>Ссылка основной кнопки <span class="hint">(обычно бот: https://t.me/...)</span></label>
            <input type="text" name="button_url" value="{{ ad.button_url }}" required>
        </div>

        <div class="field">
            <label>Прямой прокси <span class="hint">(опционально, tg://proxy?server=...)</span></label>
            <input type="text" name="proxy_url" value="{{ ad.proxy_url }}"
                   placeholder="tg://proxy?server=host&port=443&secret=...">
        </div>

        <div class="field">
            <label>Подпись fallback-кнопки <span class="hint">(если задан прямой прокси)</span></label>
            <input type="text" name="fallback_text" value="{{ ad.fallback_text }}"
                   placeholder="Не работает? Возьми свежий в боте">
        </div>

        <button type="submit" class="btn primary">Сохранить</button>
    </form>

    <hr style="margin: 32px 0 24px;">
    <h2>Статистика переходов</h2>

    <div class="stats-grid">
        {% if stats %}
            {% for key, value in stats.items() %}
                <div class="stat-item">
                    <span class="stat-key">{{ key }}</span>
                    <span class="stat-value">{{ value }}</span>
                </div>
            {% endfor %}
        {% else %}
            <p class="hint" style="text-align: center;">Статистика пока пуста. Данные появятся после первых кликов.</p>
        {% endif %}
    </div>
</main>
</body>
</html>
